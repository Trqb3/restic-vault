services:
  restic-vault:
    build: .
    container_name: restic-vault
    restart: unless-stopped
    user: "${BACKUP_UID}:${BACKUP_GID}"
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_PATH: /data/restic-vault.db
      REPO_BASE_DIR: /repos
      JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY: ${SECRET_KEY}
      # Public URL used by the agent install script (no trailing slash)
      PUBLIC_URL: ${PUBLIC_URL:-}
      # Directory where backup-source repositories are stored (writable)
      SOURCES_DIR: /data/sources
      # Path to the rest-server binary (optional — enables Backup Sources feature)
      # REST_SERVER_BINARY: /usr/local/bin/rest-server
    volumes:
      # SQLite database + backup-source repos – persisted across container restarts
      - restic_data:/data
      # Restic repositories (read-only — only for indexing pre-existing repos)
      - ${HOST_REPO_DIR:-/volume1/backup}:/repos:ro

volumes:
  restic_data:
